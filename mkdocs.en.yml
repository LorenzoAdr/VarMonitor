site_name: VarMonitor
site_description: Real-time variable monitor documentation
site_author: VarMonitor
use_directory_urls: false

docs_dir: docs_en
site_dir: site_en

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  repo_url: https://github.com/LorenzoAdr/VarMonitor
  repo_name: VarMonitor

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Installation and configuration: setup.md
  - Launch scripts: launch.md
  - Docker: docker.md
  - Packaged binary (PyInstaller): build-binary.md
  - Backend (Python): backend.md
  - Frontend: frontend.md
  - Protocols: protocols.md
  - Performance: performance.md
  - C++ integration: cpp-integration.md
  - Troubleshooting: troubleshooting.md

plugins:
  - search

extra_css:
  # Available presets:
  # - assets/astro-theme-soft.css
  # - assets/astro-theme.css        (balanced, default active)
  - assets/astro-theme-neon.css
  # - assets/astro-theme.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - admonition
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

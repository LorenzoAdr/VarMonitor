site_name: VarMonitor
site_description: Documentación del monitor de variables en tiempo real
site_author: VarMonitor
use_directory_urls: false

theme:
  name: material
  language: es
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  repo_url: https://github.com/LorenzoAdr/VarMonitor
  repo_name: VarMonitor

nav:
  - Inicio: index.md
  - Arquitectura: architecture.md
  - Instalación y configuración: setup.md
  - Lanzadores: launch.md
  - Docker: docker.md
  - Binario (PyInstaller): build-binary.md
  - Backend (Python): backend.md
  - Frontend: frontend.md
  - Protocolos: protocols.md
  - Performance: performance.md
  - Integración C++: cpp-integration.md
  - Resolución de problemas: troubleshooting.md

plugins:
  - search

extra_css:
  # Presets disponibles:
  # - assets/astro-theme-soft.css
  # - assets/astro-theme.css        (balanced, activo por defecto)
  - assets/astro-theme-neon.css
  # - assets/astro-theme.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - admonition
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
